naftiko: 1.0.0-alpha2
info:
  label: CFTC Commitments of Traders (COT) SODA API — Legacy
  description: 'CFTC Commitments of Traders (COT) SODA API — Legacy. 2 operations. Lead operation: Legacy Commitments of Traders
    (Futures Only). Self-contained Naftiko capability covering one Commodity Futures Trading Commission business surface.'
  tags:
  - Commodity Futures Trading Commission
  - Legacy
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COMMODITY_FUTURES_TRADING_COMMISSION_API_KEY: COMMODITY_FUTURES_TRADING_COMMISSION_API_KEY
capability:
  consumes:
  - type: http
    namespace: cftc-cot-legacy
    baseUri: https://publicreporting.cftc.gov/resource
    description: CFTC Commitments of Traders (COT) SODA API — Legacy business capability. Self-contained, no shared references.
    resources:
    - name: 6dca-aqww.json
      path: /6dca-aqww.json
      operations:
      - name: getlegacyfuturesonly
        method: GET
        description: Legacy Commitments of Traders (Futures Only)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: jun7-fc8e.json
      path: /jun7-fc8e.json
      operations:
      - name: getlegacycombined
        method: GET
        description: Legacy Commitments of Traders (Combined)
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: cftc-cot-legacy-rest
    port: 8080
    description: REST adapter for CFTC Commitments of Traders (COT) SODA API — Legacy. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/6dca-aqww-json
      name: 6dca-aqww-json
      description: REST surface for 6dca-aqww.json.
      operations:
      - method: GET
        name: getlegacyfuturesonly
        description: Legacy Commitments of Traders (Futures Only)
        call: cftc-cot-legacy.getlegacyfuturesonly
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/jun7-fc8e-json
      name: jun7-fc8e-json
      description: REST surface for jun7-fc8e.json.
      operations:
      - method: GET
        name: getlegacycombined
        description: Legacy Commitments of Traders (Combined)
        call: cftc-cot-legacy.getlegacycombined
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cftc-cot-legacy-mcp
    port: 9090
    transport: http
    description: MCP adapter for CFTC Commitments of Traders (COT) SODA API — Legacy. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: legacy-commitments-traders-futures-only
      description: Legacy Commitments of Traders (Futures Only)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cftc-cot-legacy.getlegacyfuturesonly
      outputParameters:
      - type: object
        mapping: $.
    - name: legacy-commitments-traders-combined
      description: Legacy Commitments of Traders (Combined)
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cftc-cot-legacy.getlegacycombined
      outputParameters:
      - type: object
        mapping: $.
