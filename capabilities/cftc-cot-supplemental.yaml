naftiko: 1.0.0-alpha2
info:
  label: CFTC Commitments of Traders (COT) SODA API — Supplemental
  description: 'CFTC Commitments of Traders (COT) SODA API — Supplemental. 1 operations. Lead operation: Supplemental Commodity
    Index Trader Report. Self-contained Naftiko capability covering one Commodity Futures Trading Commission business surface.'
  tags:
  - Commodity Futures Trading Commission
  - Supplemental
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    COMMODITY_FUTURES_TRADING_COMMISSION_API_KEY: COMMODITY_FUTURES_TRADING_COMMISSION_API_KEY
capability:
  consumes:
  - type: http
    namespace: cftc-cot-supplemental
    baseUri: https://publicreporting.cftc.gov/resource
    description: CFTC Commitments of Traders (COT) SODA API — Supplemental business capability. Self-contained, no shared
      references.
    resources:
    - name: 4zgm-a668.json
      path: /4zgm-a668.json
      operations:
      - name: getsupplementalcit
        method: GET
        description: Supplemental Commodity Index Trader Report
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    namespace: cftc-cot-supplemental-rest
    port: 8080
    description: REST adapter for CFTC Commitments of Traders (COT) SODA API — Supplemental. One Spectral-compliant resource
      per consumed operation, prefixed with /v1.
    resources:
    - path: /v1/4zgm-a668-json
      name: 4zgm-a668-json
      description: REST surface for 4zgm-a668.json.
      operations:
      - method: GET
        name: getsupplementalcit
        description: Supplemental Commodity Index Trader Report
        call: cftc-cot-supplemental.getsupplementalcit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: cftc-cot-supplemental-mcp
    port: 9090
    transport: http
    description: MCP adapter for CFTC Commitments of Traders (COT) SODA API — Supplemental. One tool per consumed operation,
      routed inline through this capability's consumes block.
    tools:
    - name: supplemental-commodity-index-trader-report
      description: Supplemental Commodity Index Trader Report
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: cftc-cot-supplemental.getsupplementalcit
      outputParameters:
      - type: object
        mapping: $.
